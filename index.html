<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CSA Evaluation Calculator</title>
    <link rel="stylesheet" href="style.css" />
  

</head>
<body>

<div class="container">
<div class="top-nav-wrapper">
    <div style="display: flex; justify-content: flex-end; gap: 10px;">
        <button type="button" class="btn-glass-action lang-btn" onclick="changeLanguage('th')">🇹🇭</button>
        <button type="button" class="btn-glass-action lang-btn" onclick="changeLanguage('en')">🇺🇸</button>
        <button type="button" class="btn-glass-action lang-btn" onclick="changeLanguage('vn')">🇻🇳</button>
        <button type="button" class="btn-glass-action lang-btn" onclick="changeLanguage('la')">🇱🇦</button>
    </div>

    <h2 class="glass-title">CSA Evaluation Calculator</h2>

    <div style="display: flex; justify-content: right; align-items: center; gap:15px; margin-top: 1px;">
        <button type="button" class="btn-glass-action func-btn btn-danger-glass" onclick="resetForm()">
            🗑️
        </button>
</div>
    <h3 class="lang-text section-title" data-key="header1">
    1. การตั้งเป้าหมาย
</h3>

<div class="form-row">
  <div class="input-group">
    <label class="lang-text" data-key="sam_label">เวลามาตรฐาน (นาที)</label>
    <input type="number" id="samInput" class="glass-input" inputmode="decimal" step="0.01" oninput="calculateAll()">
  </div>
  
  <div class="input-group">
    <label class="lang-text" data-key="eff_target">เป้าหมายประสิทธิภาพ (%)</label>
    <input type="number" id="effTargetInput" class="glass-input" inputmode="numeric" oninput="calculateAll()">
  </div>
</div>

<div class="input-group">
    <label class="lang-text" data-key="qty_label">เป้าหมายชิ้นงาน (ชิ้น/ชม.)</label>
    <input type="number"
           id="targetDisplay"
           readonly class="glass-input highlight-result-glass">
</div>
    
    <hr>
    
    <div class="actual-section">
    <h3 class="lang-text section-title" data-key="header2">2. บันทึกผลงานจริง</h3>
    
    <div class="stopwatch-glass">
        <div id="display">00:00</div>
        <div class="stopwatch-controls">
            <button type="button" id="startStopBtn" class="sw-btn btn-start-active" onclick="startStop()">Start</button>
            <button type="button" class="sw-btn btn-reset-sw" onclick="resetTimer()">Reset</button>
            <button type="button" class="sw-btn btn-save-sw" onclick="recordTime()">💾 Save</button>
        </div>
    </div>
      
    <div class="form-row-three">
      <div class="input-group">
        <label class="lang-text" data-key="total_min">เวลารวมทั้งหมด (นาที)</label>
        <input type="number" id="totalMin" class="glass-input" inputmode="numeric" value="0" oninput="calculateAll()">
      </div>
    
      <div class="input-group">
        <label class="lang-text" data-key="total_sec">เวลารวมทั้งหมด (วินาที)</label>
        <input type="number" id="totalTime" class="glass-input" inputmode="numeric" oninput="calculateAll()">
      </div>
    
      <div class="input-group">
        <label class="lang-text" data-key="total_count">จำนวนครั้งที่ทำได้ (รอบ)</label>
        <input type="number" id="totalCount" class="glass-input" inputmode="numeric" value="1" oninput="calculateAll()">
      </div>
    </div>

    <div class="input-group">
        <label class="lang-text" data-key="avg_timesec">เวลาต่อรอบจริง (วินาที)</label>
        <input type="text" id="avgTimeSec" readonly class="glass-input highlight-result-glass">
    </div>

    <div class="input-group">
        <label class="lang-text" data-key="avg_timemin">เวลาต่อรอบจริง (นาที)</label>
        <input type="text" id="avgTimeMin" readonly class="glass-input highlight-result-glass">
    </div>

    <div class="input-group">
        <label class="lang-text" data-key="actual_eff">ประสิทธิภาพจริง (%)</label>
        <input type="text" id="actualEffPerc" readonly class="glass-input highlight-result-glass">
    </div>

    <div class="input-group">
        <label class="lang-text" data-key="actual_pcs">ประสิทธิภาพจริง (ชิ้น/ชม.)</label>
        <input type="text" id="actualPcs" readonly class="glass-input highlight-result-glass">
    </div>
</div>

        <hr>
        
        <div class="quality-section";">
    <h3 class="lang-text section-title" data-key="header3">3. คุณภาพ</h3>
          
        <div class="input-group">
          <label class="lang-text"
                 data-key="pass_qty">จำนวนที่ "ผ่าน" (ชิ้น)</label>
            <input type="number"
                   id="passQty"
                   inputmode="numeric"
                   placeholder=""
                    class="glass-input"
                   oninput="calculateAll()">
        </div>
        
        <div class="input-group">
          <label class="lang-text"
                 data-key="fail_qty">จำนวนที่ "ไม่ผ่าน" (ชิ้น)</label>
            <input type="number"
                   id="failQty"
                   inputmode="numeric"
                   placeholder=""
                    class="glass-input"
                   oninput="calculateAll()">
        </div>

        <div class="input-group">
        <label class="lang-text label-qc" data-key="pass_rate">
            อัตราการผ่าน (%)
        </label>
        <div class="input-suffix">
            <input type="text"
                   id="passRate"
                   class="glass-input highlight-pass-rate"
                   placeholder=""
                   readonly>
            <span class="suffix-symbol" style="color: #248a3d;"
              </div>
          
         <hr>
        
        <div class="eff-section" style="margin-top: 30px;">
    <h3 id="header4" class="lang-text section-title training-title" data-key="header4">
        4. วางแผนการฝึก
    </h3>

    <div class="input-group">
        <label class="lang-text" data-key="training_duration">ระยะเวลาการฝึก (วัน/ชม)</label>
        <input type="number"
               id="duration"
               class="glass-input"
               inputmode="numeric"
               placeholder=""
               oninput="calculateAll()">
    </div>

    <div class="training-grid">
    <div class="day-card">
        <label class="lang-text" data-key="d_1">วัน/ชม.ที่ 1</label>
        <input type="text" id="d1" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>
    <div class="day-card">
        <label class="lang-text" data-key="d_2">วัน/ชม.ที่ 2</label>
        <input type="text" id="d2" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>
    <div class="day-card">
        <label class="lang-text" data-key="d_3">วัน/ชม.ที่ 3</label>
        <input type="text" id="d3" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>

    <div class="day-card">
        <label>วัน/ชม.ที่ 4</label>
        <input type="text" id="d4" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>
    <div class="day-card">
        <label>วัน/ชม.ที่ 5</label>
        <input type="text" id="d5" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>
    <div class="day-card">
        <label>วัน/ชม.ที่ 6</label>
        <input type="text" id="d6" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>
    <div class="day-card">
        <label>วัน/ชม.ที่ 7</label>
        <input type="text" id="d7" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>
    <div class="day-card">
        <label>วัน/ชม.ที่ 8</label>
        <input type="text" id="d8" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>
    <div class="day-card">
        <label>วัน/ชม.ที่ 9</label>
        <input type="text" id="d9" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>

    <div class="day-card">
        <label>วัน/ชม.ที่ 10</label>
        <input type="text" id="d10" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>
    <div class="day-card">
        <label>วัน/ชม.ที่ 11</label>
        <input type="text" id="d11" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>
    <div class="day-card">
        <label>วัน/ชม.ที่ 12</label>
        <input type="text" id="d12" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>
    <div class="day-card">
        <label>วัน/ชม.ที่ 13</label>
        <input type="text" id="d13" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>
    <div class="day-card">
        <label>วัน/ชม.ที่ 14</label>
        <input type="text" id="d14" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>
    <div class="day-card">
        <label>วัน/ชม.ที่ 15</label>
        <input type="text" id="d15" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>

    <div class="day-card">
        <label>วัน/ชม.ที่ 16</label>
        <input type="text" id="d16" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>
    <div class="day-card">
        <label>วัน/ชม.ที่ 17</label>
        <input type="text" id="d17" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>
    <div class="day-card">
        <label>วัน/ชม.ที่ 18</label>
        <input type="text" id="d18" readonly class="glass-input glass-input-day highlight-result-glass">
    </div>
</div>
</div>
          
</body>
 <footer style="text-align: center; padding: 20px; color: #888; font-size: 12px; font-family: sans-serif;">
    <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 10px;">
    <p>© CSA Evaluation  | v1.0.3</p>

  <button class="feedback-btn" id="feedbackBtn">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    <path d="M8 10h.01M12 10h.01M16 10h.01"/>
  </svg>
  <span class="feedback-text">Feedback</span>
</button>
   
</footer>
  <!-- Feedback Modal -->
<div id="feedbackModal" class="modal-overlay" style="display: none;">
  <div class="feedback-modal">
    <button class="modal-close" id="closeModalBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    
    <div class="modal-header">
      <div class="modal-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          <path d="M8 10h.01M12 10h.01M16 10h.01"/>
        </svg>
      </div>
      <h3 class="modal-title lang-text" data-key="feedback_title">ส่งความคิดเห็น</h3>
      <p class="modal-subtitle lang-text" data-key="feedback_subtitle">เรายินดีรับฟังความคิดเห็นของคุณ</p>
    </div>
    
    <div class="modal-body">
      <div class="rating-group">
        <label class="lang-text" data-key="feedback_rating">ระดับความพึงพอใจ</label>
        <div class="stars">
          <span class="star" data-rating="1">★</span>
          <span class="star" data-rating="2">★</span>
          <span class="star" data-rating="3">★</span>
          <span class="star" data-rating="4">★</span>
          <span class="star" data-rating="5">★</span>
        </div>
        <input type="hidden" id="ratingValue" value="0">
      </div>
      
      <div class="feedback-group">
        <label class="lang-text" data-key="feedback_message">ข้อความเสนอแนะ</label>
        <textarea id="feedbackMessage" class="feedback-textarea" rows="5" placeholder="เขียนความคิดเห็นของคุณที่นี่..."></textarea>
      </div>
      
      <div class="feedback-group">
        <label class="lang-text" data-key="feedback_contact">ข้อมูลติดต่อกลับ (ไม่บังคับ)</label>
        <input type="email" id="feedbackEmail" class="feedback-input" placeholder="your@email.com">
      </div>
    </div>
    
    <div class="modal-footer">
      <button class="btn-cancel" id="cancelFeedbackBtn">
        <span class="lang-text" data-key="cancel">ยกเลิก</span>
      </button>
      <button class="btn-submit" id="submitFeedbackBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
        <span class="lang-text" data-key="send">ส่งความคิดเห็น</span>
      </button>
    </div>
  </div>
</div>
          
  <script src="script.js"></script>

</body>
</html>
