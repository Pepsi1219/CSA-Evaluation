<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4f46e5">
    <title>CSA Evaluation Calculator</title>

    <!-- Fonts: Inter (Latin/VN) + Noto Sans Thai + Noto Sans Lao -->
    <!-- Loaded asynchronously in script.js so a slow network never blocks first paint -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

    <!-- ============ Header ============ -->
    <header class="app-header">
        <div class="header-top">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="2" width="16" height="20" rx="2"/>
                        <line x1="8" y1="6" x2="16" y2="6"/>
                        <line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/>
                        <line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/>
                        <line x1="8" y1="18" x2="10" y2="18"/><line x1="14" y1="18" x2="16" y2="18"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <h1 class="glass-title">CSA Calculator</h1>
                    <p class="brand-sub lang-text" data-key="brand_sub">เครื่องมือประเมินประสิทธิภาพ</p>
                </div>
            </div>

            <div class="header-actions">
                <!-- Language dropdown -->
                <div class="lang-selector" id="langSelector">
                    <button type="button" class="lang-trigger" id="langTrigger" aria-haspopup="true" aria-expanded="false">
                        <span class="flag" id="currentFlag">🇹🇭</span>
                        <span class="lang-name" id="currentLangName">ไทย</span>
                        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="lang-menu" role="menu">
                        <button type="button" class="lang-option active" data-lang="th" role="menuitem">
                            <span class="flag">🇹🇭</span><span>ไทย</span>
                            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                        <button type="button" class="lang-option" data-lang="en" role="menuitem">
                            <span class="flag">🇺🇸</span><span>English</span>
                            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                        <button type="button" class="lang-option" data-lang="vn" role="menuitem">
                            <span class="flag">🇻🇳</span><span>Tiếng Việt</span>
                            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                        <button type="button" class="lang-option" data-lang="la" role="menuitem">
                            <span class="flag">🇱🇦</span><span>ລາວ</span>
                            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Reset -->
                <button type="button" class="icon-btn danger" onclick="resetForm()" aria-label="Reset" title="Reset">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        <line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- ============ Section 1: Target ============ -->
    <h3 class="section-title">
        <span class="section-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        </span>
        <span class="lang-text" data-key="header1">การตั้งเป้าหมาย</span>
    </h3>

    <div class="form-row">
        <div class="input-group">
            <label class="lang-text" data-key="sam_label">ค่า SAM (นาที)</label>
            <input type="number" id="samInput" class="glass-input" inputmode="decimal" step="0.01" oninput="calculateAll()">
        </div>
        <div class="input-group">
            <label class="lang-text" data-key="eff_target">เป้าหมายประสิทธิภาพ (%)</label>
            <input type="number" id="effTargetInput" class="glass-input" inputmode="numeric" oninput="calculateAll()">
        </div>
    </div>

    <div class="input-group">
        <label class="lang-text" data-key="qty_label">เป้าหมายชิ้นงาน (ชิ้น/ชม.)</label>
        <input type="number" id="targetDisplay" readonly class="glass-input highlight-result-glass">
    </div>

    <hr>

    <!-- ============ Section 2: Actual ============ -->
    <div class="actual-section">
        <h3 class="section-title">
            <span class="section-badge" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3 2 6"/><path d="m22 6-3-3"/></svg>
            </span>
            <span class="lang-text" data-key="header2">บันทึกผลงานจริง</span>
        </h3>

        <div class="stopwatch-glass">
            <div id="display">00:00:00</div>
            <div class="stopwatch-controls">
                <button type="button" id="startStopBtn" class="sw-btn btn-start-active" onclick="startStop()">Start</button>
                <button type="button" class="sw-btn btn-reset-sw" onclick="resetTimer()">Reset</button>
                <button type="button" class="sw-btn btn-save-sw" onclick="recordTime()">💾 Save</button>
            </div>
        </div>

        <div class="form-row-three">
            <div class="input-group">
                <label class="lang-text" data-key="total_min">เวลารวม (นาที)</label>
                <input type="number" id="totalMin" class="glass-input" inputmode="numeric" value="0" oninput="calculateAll()">
            </div>
            <div class="input-group">
                <label class="lang-text" data-key="total_sec">เวลารวม (วินาที)</label>
                <input type="number" id="totalTime" class="glass-input" inputmode="numeric" oninput="calculateAll()">
            </div>
            <div class="input-group">
                <label class="lang-text" data-key="total_count">จำนวน (รอบ)</label>
                <input type="number" id="totalCount" class="glass-input" inputmode="numeric" value="1" oninput="calculateAll()">
            </div>
        </div>

        <div class="form-row">
            <div class="input-group">
                <label class="lang-text" data-key="avg_timesec">เวลาต่อรอบ (วินาที)</label>
                <input type="text" id="avgTimeSec" readonly class="glass-input highlight-result-glass">
            </div>
            <div class="input-group">
                <label class="lang-text" data-key="avg_timemin">เวลาต่อรอบ (นาที)</label>
                <input type="text" id="avgTimeMin" readonly class="glass-input highlight-result-glass">
            </div>
        </div>

        <div class="form-row">
            <div class="input-group">
                <label class="lang-text" data-key="actual_eff">ประสิทธิภาพจริง (%)</label>
                <input type="text" id="actualEffPerc" readonly class="glass-input highlight-result-glass">
            </div>
            <div class="input-group">
                <label class="lang-text" data-key="actual_pcs">ประสิทธิภาพจริง (ชิ้น/ชม.)</label>
                <input type="text" id="actualPcs" readonly class="glass-input highlight-result-glass">
            </div>
        </div>
    </div>

    <hr>

    <!-- ============ Section 3: Quality ============ -->
    <div class="quality-section">
        <h3 class="section-title">
            <span class="section-badge" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m8.5 12 2.5 2.5 4.5-4.5"/></svg>
            </span>
            <span class="lang-text" data-key="header3">คุณภาพ</span>
        </h3>

        <div class="form-row">
            <div class="input-group">
                <label class="lang-text" data-key="pass_qty">จำนวนที่ "ผ่าน" (ชิ้น)</label>
                <input type="number" id="passQty" inputmode="numeric" class="glass-input" oninput="calculateAll()">
            </div>
            <div class="input-group">
                <label class="lang-text" data-key="fail_qty">จำนวนที่ "ไม่ผ่าน" (ชิ้น)</label>
                <input type="number" id="failQty" inputmode="numeric" class="glass-input" oninput="calculateAll()">
            </div>
        </div>

        <div class="input-group">
            <label class="lang-text" data-key="pass_rate">อัตราการผ่าน (%)</label>
            <input type="text" id="passRate" class="glass-input highlight-pass-rate" readonly>
        </div>
    </div>

    <hr>

    <!-- ============ Section 4: Training ============ -->
    <div class="eff-section">
        <h3 class="section-title">
            <span class="section-badge" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
            </span>
            <span class="lang-text" data-key="header4">วางแผนการฝึก</span>
        </h3>

        <div class="input-group">
            <label class="lang-text" data-key="training_duration">ระยะเวลาการฝึก (วัน/ชม)</label>
            <input type="number" id="duration" class="glass-input" inputmode="numeric" oninput="calculateAll()">
        </div>

        <div class="training-grid" id="trainingGrid"></div>
    </div>

</div><!-- /.container -->

<!-- ============ Footer ============ -->
<footer class="app-footer">
    <hr>
    <p>© CSA Evaluation · v1.1.0</p>
    <button class="feedback-btn" id="feedbackBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="feedback-text lang-text" data-key="feedback_btn">Feedback</span>
    </button>
</footer>

<!-- ============ Feedback Modal ============ -->
<div id="feedbackModal" class="modal-overlay" style="display: none;">
    <div class="feedback-modal">
        <button class="modal-close" id="closeModalBtn" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <div class="modal-header">
            <div class="modal-icon" aria-hidden="true">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <h3 class="modal-title lang-text" data-key="feedback_title">ส่งความคิดเห็น</h3>
            <p class="modal-subtitle lang-text" data-key="feedback_subtitle">เรายินดีรับฟังความคิดเห็นของคุณ</p>
        </div>
        <div class="modal-body">
            <div class="rating-group">
                <label class="lang-text" data-key="feedback_rating">ระดับความพึงพอใจ</label>
                <div class="stars">
                    <span class="star" data-rating="1">★</span>
                    <span class="star" data-rating="2">★</span>
                    <span class="star" data-rating="3">★</span>
                    <span class="star" data-rating="4">★</span>
                    <span class="star" data-rating="5">★</span>
                </div>
                <input type="hidden" id="ratingValue" value="0">
            </div>
            <div class="feedback-group">
                <label class="lang-text" data-key="feedback_message">ข้อความเสนอแนะ</label>
                <textarea id="feedbackMessage" class="feedback-textarea" rows="5" placeholder="เขียนความคิดเห็นของคุณที่นี่..."></textarea>
            </div>
            <div class="feedback-group">
                <label class="lang-text" data-key="feedback_contact">ข้อมูลติดต่อกลับ (ไม่บังคับ)</label>
                <input type="email" id="feedbackEmail" class="feedback-input" placeholder="your@email.com">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" id="cancelFeedbackBtn">
                <span class="lang-text" data-key="cancel">ยกเลิก</span>
            </button>
            <button class="btn-submit" id="submitFeedbackBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                <span class="lang-text" data-key="send">ส่งความคิดเห็น</span>
            </button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
